[platformio]
; The LittleFS image (`pio run -t uploadfs`) is built from the PWA folder, so
; pwa_app/ is the single source of truth — nothing is copied.
data_dir = ../pwa_app

; Shared Arduino/board config. NOT the [env] default section on purpose: the
; native test env must not inherit `board`/`framework`, so the firmware envs
; opt in with `extends = arduino_base` instead.
[arduino_base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Pin flashing/monitoring to the ESP32-S3 native-USB port so auto-detect can't
; fall back to a motherboard serial port (/dev/ttyS0) when the board is absent.
upload_port = /dev/ttyACM*
monitor_port = /dev/ttyACM*
board_build.filesystem = littlefs
; default_8MB.csv = two OTA app slots (~3.2 MB each) + a 1.5 MB LittleFS.
; REQUIRED for OTA firmware updates — huge_app.csv has only ONE app slot and
; cannot self-update over WiFi.
board_build.partitions = default_8MB.csv
; The DevKitC-1 is used over its NATIVE USB port, so route Serial to USB-CDC —
; without this, Serial.print produces no output on /dev/ttyACM*.
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1
; Stamp FW_VERSION / FW_GIT_COMMIT from git at build time (see version.h).
extra_scripts = pre:scripts/gen_version.py
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    links2004/WebSockets@^2.4.1

; The shippable firmware. Built + packaged for Releases with ./build_release.sh.
[env:obd1]
extends = arduino_base

; Fault-injection build for rollback testing (Layer 5): reports healthy=false
; so a freshly-OTA'd copy never self-confirms and the bootloader must revert to
; the previous slot. Used only by tests/hil_roundtrip.py --fault-injection.
; DO NOT ship — it is not part of build_release.sh / Releases.
[env:badhealth]
extends = arduino_base
build_flags =
    ${arduino_base.build_flags}
    -DFORCE_UNHEALTHY

; On-target smoke tests (Layer 3): flashed to the attached board; verifies
; LittleFS mounts, the OTA partition table is correct, and the AP starts.
;   pio test -e test_esp32
[env:test_esp32]
extends = arduino_base
test_framework = unity
test_filter = test_target_smoke

; Hardware bring-up: blink every LED in sequence + USB serial print.
; Compiles only hwtest/hw_test.cpp (skips the app in src/).
;   pio run -e hwtest -t upload -t monitor
[env:hwtest]
extends = arduino_base
build_src_filter = -<*> +<../hwtest/hw_test.cpp>

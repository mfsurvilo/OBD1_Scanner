<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="OBD1 Scanner device console">
  <title>OBD1 Scanner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/dashboard.png">
  <link rel="apple-touch-icon" href="icons/dashboard.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>OBD1 Scanner</h1>
    <span id="dot" class="dot" title="link status"></span>
  </header>

  <main>
    <!-- Live device status (proves the backend is alive) -->
    <section class="card">
      <h2>Device status</h2>
      <dl class="kv">
        <dt>Link</dt>       <dd id="s-link">connecting…</dd>
        <dt>Version</dt>    <dd id="s-version">—</dd>
        <dt>Build</dt>      <dd id="s-build">—</dd>
        <dt>Commit</dt>     <dd id="s-commit">—</dd>
        <dt>Uptime</dt>     <dd id="s-uptime">—</dd>
        <dt>Free heap</dt>  <dd id="s-heap">—</dd>
        <dt>Clients</dt>    <dd id="s-clients">—</dd>
        <dt>Internet</dt>   <dd id="s-sta">—</dd>
      </dl>
    </section>

    <!-- Update over the internet (device pulls from GitHub via home Wi-Fi) -->
    <section class="card">
      <h2>Internet update</h2>
      <p class="hint">Connect the scanner to your home Wi-Fi so it can pull
        updates from the internet itself — no file downloads needed.</p>

      <form id="wifi-form" autocomplete="off">
        <input type="text" id="wifi-ssid" placeholder="Wi-Fi network (SSID)">
        <input type="password" id="wifi-pass" placeholder="Wi-Fi password">
        <button type="submit" id="wifi-btn" class="btn btn-alt">Save &amp; Connect</button>
      </form>
      <p id="wifi-msg" class="msg"></p>

      <div id="upd-block" style="margin-top:14px">
        <button id="chk-btn" class="btn">Check for updates</button>
        <p id="chk-msg" class="msg"></p>
        <button id="pull-btn" class="btn" style="display:none">Update now</button>
        <p id="pull-msg" class="msg"></p>
      </div>
    </section>
  </main>

  <footer><span id="foot">OBD1 Scanner console</span></footer>

  <script src="js/app.js"></script>
</body>
</html>

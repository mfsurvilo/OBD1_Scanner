name: release

# On a version tag: build both firmwares, package every image, and publish the
# binaries (.bin/.ota) to a GitHub Release. (Pages is deployed separately by
# pages.yml on master pushes, which the github-pages environment allows.)
#
# Cut a release with:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write     # create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # tags needed for `git describe` version stamping

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}

      - run: pip install platformio esptool

      - name: Build + package all images
        run: bash firmware/build_firmwares.sh

      - name: Publish Release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware_server/firmware/*.bin
            firmware_server/firmware/*.ota
          fail_on_unmatched_files: true

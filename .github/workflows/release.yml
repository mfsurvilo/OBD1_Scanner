name: release

# On a version tag: build the firmware, package the images, and publish them to
# a GitHub Release. Assets have stable names (the tag carries the version):
#   firmware.bin    app image      (OTA: pulled by the "Update now" button)
#   filesystem.bin  LittleFS / PWA (OTA: pulled by the "Update now" button)
#   factory.bin     full flash     (USB recovery via the flasher page)
#
# Cut a release with:
#   git tag v0.5 && git push origin v0.5
on:
  push:
    tags: ["v*"]

permissions:
  contents: write     # create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # tags needed for `git describe` version stamping

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}

      - run: pip install platformio esptool

      - name: Build + package release images
        run: bash firmware/build_release.sh

      - name: Publish Release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware_server/firmware/firmware.bin
            firmware_server/firmware/filesystem.bin
            firmware_server/firmware/factory.bin
          fail_on_unmatched_files: true

name: pages

# Deploy the USB recovery flasher (firmware_server/flasher/) to GitHub Pages.
# index.html reads versions.json and flashes each version's factory.bin. GitHub
# release assets aren't served with CORS headers (so ESP Web Tools can't fetch
# them cross-origin), so this workflow mirrors each listed version's factory.bin
# onto the Pages origin under fw/<tag>-factory.bin. No firmware build needed.
# Triggered on pushes to master (the github-pages environment allows the default
# branch).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage Pages site
        run: |
          mkdir -p site/fw
          cp -r firmware_server/flasher/* site/
          # Mirror each listed version's factory.bin onto this origin so ESP Web
          # Tools can fetch it (GitHub release assets lack CORS headers).
          for tag in $(jq -r '.versions[].tag' firmware_server/flasher/versions.json); do
            echo "==> mirroring $tag/factory.bin"
            curl -fSL -o "site/fw/${tag}-factory.bin" \
              "https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/factory.bin"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

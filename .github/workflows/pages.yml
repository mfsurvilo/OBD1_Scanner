name: pages

# Deploy the USB recovery flasher (firmware_server/flasher/) to GitHub Pages.
# The flasher is fully static: index.html reads versions.json and pulls each
# version's factory.bin straight from its GitHub Release, so no firmware build
# is needed here. Triggered on pushes to master (the github-pages environment
# allows the default branch).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage Pages site
        run: |
          mkdir -p site
          cp -r firmware_server/flasher/* site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
